<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aesthetic Friends Clock</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:italic,wght@600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #faf9f6;
      --cal-bg: #ffffff;
      --accent-green: #8e9775;
      --text-main: #1a1a1a;
      --text-dim: #999;
      --border-dark: #888;
      --hover-bg: #f5f5f5;
    }

    [data-theme="dark"] {
      --bg: #121212;
      --cal-bg: #1e1e1e;
      --text-main: #f0f0f0;
      --text-dim: #777;
      --border-dark: #555;
      --hover-bg: #2a2a2a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      color: var(--text-main);
      transition: background 0.3s ease;
      perspective: 1000px;
    }

    .clock-container {
      width: 320px;
      height: 280px; /* Slightly taller for the list */
      position: relative;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
    }

    .clock-container.flipped { transform: rotateY(180deg); }

    .clock-card {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      background: var(--cal-bg);
      padding: 1.5rem;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .clock-card-back { transform: rotateY(180deg); overflow-y: auto; }

    .flip-btn {
      position: absolute;
      top: 15px;
      right: 15px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-dim);
      font-size: 18px;
    }

    .date-row {
      margin-bottom: 0.1rem;
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .month-serif { font-family: 'Playfair Display', serif; font-size: 22px; font-style: italic; font-weight: 600; }
    .day-year-sans { font-size: 16px; color: var(--text-dim); }

    .time-display {
      font-size: 42px;
      font-weight: 700;
      margin-bottom: 1rem;
      font-variant-numeric: tabular-nums;
    }

    .friend-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--accent-green);
      margin-bottom: 5px;
      font-weight: 600;
    }

    /* Back Styles */
    .back-title { font-size: 11px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; margin-bottom: 10px; }
    
    .friends-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 15px;
    }

    .friend-btn {
      width: 100%;
      padding: 8px;
      border: 1px solid var(--border-dark);
      background: none;
      color: var(--text-main);
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      text-align: left;
      transition: 0.2s;
    }

    .friend-btn:hover { background: var(--hover-bg); border-color: var(--accent-green); }

    input#tz-input {
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid var(--border-dark);
      background: var(--bg);
      color: var(--text-main);
      font-size: 11px;
    }
  </style>
</head>
<body>

<div class="clock-container" id="card-container">
  <div class="clock-card">
    <button class="flip-btn" onclick="toggleFlip()">→</button>
    <div id="friend-name" class="friend-label">My Time</div>
    <div class="date-row">
      <span class="month-serif" id="month">--</span>
      <span class="day-year-sans" id="day-year">--</span>
    </div>
    <div class="time-display" id="time">--:-- --</div>
    <button class="theme-toggle" id="theme-btn" style="background:none; border:1px solid var(--border-dark); font-size:9px; padding:5px 10px; border-radius:5px; color:var(--text-dim); cursor:pointer;">MODE</button>
  </div>

  <div class="clock-card clock-card-back">
    <button class="flip-btn" onclick="toggleFlip()">←</button>
    <div class="back-title">Quick Select Friend</div>
    
    <div class="friends-list" id="friends-list">
      </div>

    <div class="back-title">Search Other Location</div>
    <input list="tz-options" id="tz-input" placeholder="Type city...">
    <datalist id="tz-options"></datalist>
  </div>
</div>

<script>
  const container = document.getElementById('card-container');
  const tzInput = document.getElementById('tz-input');
  const friendNameDisplay = document.getElementById('friend-name');
  
  let currentTz = "Europe/Bucharest";

  // 1. Define your friends here!
  const friends = [
    { name: "My Time", zone: "Europe/Bucharest" },
    { name: "Alicia", zone: "Asia/Singapore" },
    { name: "Andrew", zone: "Asia/Singapore" },
    { name: "Sofia", zone: "Europe/London" },
    { name: "Marcus", zone: "America/New_York" }
  ];

  // 2. Generate the Friend Buttons
  const listContainer = document.getElementById('friends-list');
  friends.forEach(f => {
    const btn = document.createElement('button');
    btn.className = 'friend-btn';
    btn.textContent = `${f.name} (${f.zone.split('/').pop().replace(/_/g, ' ')})`;
    btn.onclick = () => {
      currentTz = f.zone;
      friendNameDisplay.textContent = f.name;
      updateClock();
      toggleFlip();
    };
    listContainer.appendChild(btn);
  });

  // Populate Datalist for custom search
  const zones = Intl.supportedValuesOf('timeZone');
  const datalist = document.getElementById('tz-options');
  zones.forEach(zone => {
    const opt = document.createElement('option');
    opt.value = zone;
    datalist.appendChild(opt);
  });

  tzInput.onchange = () => {
    if (zones.includes(tzInput.value)) {
      currentTz = tzInput.value;
      friendNameDisplay.textContent = currentTz.split('/').pop().replace(/_/g, ' ');
      updateClock();
      toggleFlip();
    }
  };

  function toggleFlip() { container.classList.toggle('flipped'); }

  document.getElementById('theme-btn').onclick = () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
  };

  function updateClock() {
    const now = new Date();
    const timeStr = now.toLocaleTimeString('en-US', { 
      timeZone: currentTz,
      hour: 'numeric', minute: '2-digit', hour12: true 
    }).toLowerCase();

    const monthStr = now.toLocaleDateString('en-US', { timeZone: currentTz, month: 'long' });
    const dayYearStr = now.toLocaleDateString('en-US', { timeZone: currentTz, day: 'numeric' }) 
      + ", " + now.toLocaleDateString('en-US', { timeZone: currentTz, year: 'numeric' });

    document.getElementById("time").textContent = timeStr;
    document.getElementById("month").textContent = monthStr;
    document.getElementById("day-year").textContent = dayYearStr;
  }

  setInterval(updateClock, 1000);
  updateClock();
</script>

</body>
</html>
