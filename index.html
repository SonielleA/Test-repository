<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global 12h Clock</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #1a1a2e;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .clock-card {
            background: #16213e;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid #0f3460;
            width: 400px;
        }
        select {
            width: 100%;
            padding: 12px;
            background: #0f3460;
            color: #e94560;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            margin-bottom: 20px;
            outline: none;
        }
        #clock {
            font-size: 3.5rem;
            font-family: 'Courier New', monospace;
            color: #00d2ff;
            text-shadow: 0 0 20px rgba(0,210,255,0.3);
        }
        .label {
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            color: #95a5a6;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div class="clock-card">
        <div class="label">Select Global Location</div>
        <select id="zone-picker"></select>

        <div class="label">Current Time</div>
        <div id="clock">00:00:00 AM</div>
    </div>

    <script>
        const picker = document.getElementById('zone-picker');
        const clockDisplay = document.getElementById('clock');

        // 1. Automatically get ALL timezones available in the browser
        const allZones = Intl.supportedValuesOf('timeZone');

        // 2. Populate the dropdown menu
        allZones.forEach(zone => {
            const option = document.createElement('option');
            option.value = zone;
            // Clean up the text: Replace underscores with spaces and wrap in {}
            option.textContent = `{${zone.replace(/_/g, ' ')}}`;
            picker.appendChild(option);
        });

        // Set default to user's local timezone
        picker.value = Intl.DateTimeFormat().resolvedOptions().timeZone;

        function updateClock() {
            const now = new Date();
            const zone = picker.value;

            // Format to 12-hour time for the selected zone
            const timeString = now.toLocaleTimeString('en-US', {
                timeZone: zone,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: true
            });

            clockDisplay.textContent = timeString;
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
