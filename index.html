<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notion Friends Clock</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:italic,wght@600&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-page: transparent;
      --bg-widget: #ffffff;
      --text-main: #1a1a1a;
      --text-dim: #999999;
      --border: rgba(0,0,0,0.1);
      --accent: #8e9775;
      /* Replace URL below with your preferred default image */
      --widget-bg: url('https://images.unsplash.com/photo-1497436072909-60f360e1d4b1?q=80&w=2560');
      --overlay: rgba(255, 255, 255, 0.85);
    }

    [data-theme="dark"] {
      --bg-widget: #1e1e1e;
      --text-main: #f0f0f0;
      --text-dim: #777777;
      --border: rgba(255,255,255,0.1);
      --overlay: rgba(30, 30, 30, 0.85);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-page);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      color: var(--text-main);
      perspective: 1000px;
      overflow: hidden;
    }

    .clock-container {
      width: 320px;
      height: 280px;
      position: relative;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
    }

    .clock-container.flipped { transform: rotateY(180deg); }

    .clock-card {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      background-color: var(--bg-widget);
      background-image: var(--widget-bg);
      background-size: cover;
      background-position: center;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* Consistent Overlay */
    .clock-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--overlay);
      z-index: 1;
      transition: background 0.3s ease;
    }

    .content-wrapper {
      position: relative;
      z-index: 2;
      width: 100%;
      padding: 1.5rem;
      text-align: center;
    }

    .clock-card-back { transform: rotateY(180deg); }

    /* Flip Button Styling */
    .flip-btn {
      position: absolute;
      top: 15px;
      right: 15px;
      background: none;
      border: 1px solid var(--border);
      cursor: pointer;
      color: var(--text-dim);
      font-size: 14px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 3;
    }

    .friend-label {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 14px;
      color: var(--accent);
      margin-bottom: 4px;
      font-weight: 600;
    }

    .date-row {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 6px;
      margin-bottom: 2px;
    }

    .month-serif { font-family: 'Playfair Display', serif; font-size: 22px; font-style: italic; font-weight: 600; }
    .day-year-sans { font-size: 16px; color: var(--text-dim); }

    .time-display {
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -0.04em;
      margin-bottom: 1.5rem;
      font-variant-numeric: tabular-nums;
    }

    .theme-toggle {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      cursor: pointer;
    }

    /* Back Page Search Styles */
    .search-group { width: 100%; margin-bottom: 15px; text-align: left; }
    .section-title { 
      font-size: 10px; 
      font-weight: 700; 
      color: var(--text-dim); 
      text-transform: uppercase; 
      margin-bottom: 6px; 
      letter-spacing: 0.5px;
    }
    
    input.search-bar {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.1);
      color: var(--text-main);
      font-size: 12px;
      outline: none;
    }
  </style>
</head>
<body>

<div class="clock-container" id="card-container">
  <div class="clock-card">
    <button class="flip-btn" onclick="toggleFlip()">⚙</button>
    <div class="content-wrapper">
      <div id="display-name" class="friend-label">My Time</div>
      <div class="date-row">
        <span class="month-serif" id="month
